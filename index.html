<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ HÀNG HÀ NỘI 1983</title>
    <link rel="icon" href="https://i.ibb.co/s9p8Tx5D/1983.png" type="image/png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f5f5f7;
        }
        .menu-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            background-color: #fff;
        }
        .menu-image {
            width: 100%;
            height: auto;
            display: block;
            background-color: #eaeaea; 
        }
        
        .promo-btn {
            display: block;
            text-align: center;
            background-color: #ff3b30;
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .promo-btn:hover {
            background-color: #d63026;
        }

        /* --- CSS CHO CỤM NÚT LIÊN HỆ GÓC TRÁI --- */
        .contact-wrapper {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column; /* Xếp 2 nút theo chiều dọc */
            gap: 10px;              /* Khoảng cách hở giữa 2 nút */
            z-index: 1000;
        }

        /* Định dạng chung cho cả 2 nút */
        .floating-btn {
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s, background-color 0.3s;
        }
        .floating-btn:hover {
            transform: scale(1.05);
        }

        /* Màu riêng cho nút Gọi điện */
        .btn-call {
            background-color: #27ae60; 
        }
        .btn-call:hover {
            background-color: #219653;
        }

        /* Màu riêng cho nút Zalo */
        .btn-zalo {
            background-color: #0068ff; /* Xanh dương chuẩn của Zalo */
        }
        .btn-zalo:hover {
            background-color: #0055d4; /* Xanh đậm hơn chút khi rê chuột */
        }
    </style>
</head>
<body>

    <div class="contact-wrapper">
        <a href="tel:0336346346" class="floating-btn btn-call">📞 LIÊN HỆ: 0336.346.346</a>
        <a href="https://zalo.me/0336346346" target="_blank" class="floating-btn btn-zalo">💬 ZALO: 0336.346.346</a>
    </div>

    <div class="menu-container">
        <img src="https://i.ibb.co/chnhJHXw/Asset-1.png" alt="Menu Trang 1" class="menu-image">
        
        <img src="https://i.ibb.co/WN30BKLX/Asset-2.png" alt="Menu Trang 2" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/PsmrK2RY/Asset-3.png" alt="Menu Trang 3" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/Y9X1dG4/Asset-4.png" alt="Menu Trang 4" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/hRjY7gT1/Asset-5.png" alt="Menu Trang 5" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/Cphc8CR1/Asset-6.png" alt="Menu Trang 6" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/xScfs3T0/Asset-7.png" alt="Menu Trang 7" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/5g8hPV2K/Asset-8.png" alt="Menu Trang 8" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/tP2PKnSt/Asset-10.png" alt="Menu Trang 9" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/99KyrwVh/Asset-11.png" alt="Menu Trang 10" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/q3fB09TZ/Asset-12.png" alt="Menu Trang 11" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/rGzBDYHm/Asset-13.png" alt="Menu Trang 12" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/tMWdDMgd/Asset-14.png" alt="Menu Trang 13" class="menu-image" loading="lazy">
        
        <a href="https://jmarthcm.com/" class="promo-btn" target="_blank">Nhấn vào đây để nhận nhiều ưu đãi khác</a>
    </div>

</body>
</html>
