<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu J-Mart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f7;
        }
        .menu-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .menu-image {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <!-- Chỉ cần điền đúng tên file ảnh bạn đã lưu trong thư mục -->
        <img src="https://i.ibb.co/SDhhPMN5/menu2.png" alt="Menu Trang 1" class="menu-image">
        <img src="https://i.ibb.co/mCK4KVBm/menu1.png" alt="Menu Trang 2" class="menu-image">
    </div>

</body>
</html>
