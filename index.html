<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ HÀNG HÀ NỘI 1983</title>
    <link rel="icon" href="https://i.ibb.co/s9p8Tx5D/1983.png" type="image/png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f5f5f7;
        }
        .menu-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            background-color: #fff;
        }
        .menu-image {
            width: 100%;
            height: auto;
            display: block;
            background-color: #eaeaea; 
        }
        
        .promo-btn {
            display: block;
            text-align: center;
            background-color: #ff3b30;
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .promo-btn:hover {
            background-color: #d63026;
        }

        /* --- CSS CHO POPUP ĐẶT BÀN --- */
        .floating-contact {
            position: fixed;         /* Lệnh này giúp nút luôn "dính" vào màn hình */
            top: 20px;               /* Cách góc trên 20px */
            left: 20px;              /* Cách góc trái 20px */
            background-color: #27ae60; /* Màu xanh lá nổi bật và thân thiện */
            color: white;
            padding: 10px 15px;
            border-radius: 30px;     /* Bo tròn 2 đầu */
            font-size: 13px;         /* Chữ nhỏ gọn */
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* Đổ bóng nhẹ cho nút nổi lên */
            z-index: 1000;           /* Đảm bảo nút luôn nằm trên cùng, không bị ảnh đè lên */
            transition: transform 0.3s;
        }
        /* Hiệu ứng khi rê chuột vào (trên máy tính) */
        .floating-contact:hover {
            transform: scale(1.05);  /* Phóng to một chút */
            background-color: #219653;
        }
    </style>
</head>
<body>

    <a href="tel:0336346346" class="floating-contact">📞 LIÊN HỆ ĐẶT BÀN 0336.346.346</a>

    <div class="menu-container">

        <img src="https://i.ibb.co/WN30BKLX/Asset-2.png" alt="Menu Trang 2" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/PsmrK2RY/Asset-3.png" alt="Menu Trang 3" class="menu-image" loading="lazy">

        <img src="https://i.ibb.co/hRjY7gT1/Asset-5.png" alt="Menu Trang 5" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/Cphc8CR1/Asset-6.png" alt="Menu Trang 6" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/xScfs3T0/Asset-7.png" alt="Menu Trang 7" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/5g8hPV2K/Asset-8.png" alt="Menu Trang 8" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/tP2PKnSt/Asset-10.png" alt="Menu Trang 9" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/99KyrwVh/Asset-11.png" alt="Menu Trang 10" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/q3fB09TZ/Asset-12.png" alt="Menu Trang 11" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/rGzBDYHm/Asset-13.png" alt="Menu Trang 12" class="menu-image" loading="lazy">
        <img src="https://i.ibb.co/tMWdDMgd/Asset-14.png" alt="Menu Trang 13" class="menu-image" loading="lazy">
        
        <a href="https://jmarthcm.com/" class="promo-btn" target="_blank">Nhấn vào đây để nhận nhiều ưu đãi khác</a>

</body>
</html>
